name: build

on:
  workflow_dispatch:
    inputs:
      FFmpeg_version:
        type: string
        required: true
        description: "FFmepgバージョン"
      OS_version:
        type: string
        required: true
        description: "OSバージョン"
      latest_tag:
        type: boolean
        required: true
        default: false
        description: "latest タグを付ける"

env:
  IMAGE_NAME: docker-avisynthplus
  #set tagname　: "." を除去（Ubuntu24.04 -> Ubuntu2404）
  TAG_NAME: ${{ github.event.inputs.FFmpeg_version }}-${{ replace(github.event.inputs.OS_version, '.', '') }}
  #set targetdir
  TARGET_DIR: ${{ github.event.inputs.FFmpeg_version }}/${{ github.event.inputs.OS_version }}

jobs:
  # Push image to GitHub Packages.
  # See also https://docs.docker.com/docker-hub/builds/
  push:
    # Ensure test job passes before pushing image.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compose tags
        id: compose_tags
        shell: bash
        run: |
          BASE_TAG="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.TAG_NAME }}"

          {
            echo "tags<<EOF"
            echo "${BASE_TAG}"

            # workflow_dispatch の boolean は github.event.inputs だと文字列になることがある
            if [[ "${{ github.event.inputs.push_latest }}" == "true" ]]; then
              echo "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.TARGET_DIR }}
          provenance: false
          push: true
          tags: ${{ steps.compose_tags.outputs.tags }}
